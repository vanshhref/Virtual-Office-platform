# docker-compose.yml
version: '3.8'

services:
  backend:
    build: ./Backend
    expose:
      - "4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - DATABASE_URL=./database.sqlite
      - CLIENT_URL=${CLIENT_URL:-http://localhost}
      - JWT_SECRET=${JWT_SECRET:-change-this-secret}
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./Backend/database.sqlite:/app/database.sqlite
    depends_on:
      - redis

  frontend:
    build:
      context: ./Frontend/virtual-office
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost}
    ports:
      - "80:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
